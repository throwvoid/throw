<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>account not found</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <!-- social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg:        #050505;
      --border:    rgba(255,255,255,0.10);
      --border-hi: rgba(255,255,255,0.28);
      --white:     #ffffff;
      --faint:     rgba(255,255,255,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.88) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .wrap {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 5rem;
    }

    /* card */
    .card {
      width: 100%;
      max-width: 445px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 2px;
      opacity: 0;
      animation: boot 1.4s ease forwards;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 12px 60px rgba(0,0,0,0.9);
    }
    @keyframes boot {
      0%   { opacity:0; transform:translateY(16px); }
      100% { opacity:1; transform:translateY(0); }
    }

    /* titlebar */
    .titlebar {
      display: flex; align-items: center; gap: 7px;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #ff5f57; box-shadow: 0 0 5px #ff5f57; }
    .dot.y { background: #febc2e; box-shadow: 0 0 5px #febc2e; }
    .dot.g { background: #28c840; box-shadow: 0 0 5px #28c840; }
    .bar-title {
      margin-left: auto;
      font-size: 0.60rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em;
      font-family: 'Share Tech Mono', monospace;
    }

    .inner { padding: 2rem 1.8rem 1.8rem; }

    /* avatar */
    .avatar-wrap { display:flex; justify-content:center; margin-bottom:1.1rem; }
    .avatar-outer { position:relative; width:112px; height:112px; }

    .avatar-outer::before,
    .avatar-outer::after,
    .corner-tr, .corner-bl {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-style: solid;
    }
    .avatar-outer::before { top:-5px;    left:-5px;   border-width:1.5px 0 0 1.5px; border-color:rgba(255,255,255,0.7); }
    .avatar-outer::after  { bottom:-5px; right:-5px;  border-width:0 1.5px 1.5px 0; border-color:rgba(255,255,255,0.7); }
    .corner-tr            { top:-5px;    right:-5px;  border-width:1.5px 1.5px 0 0; border-color:rgba(255,255,255,0.3); }
    .corner-bl            { bottom:-5px; left:-5px;   border-width:0 0 1.5px 1.5px; border-color:rgba(255,255,255,0.3); }

    .avatar-img {
      width:112px; height:112px;
      border-radius:50%; object-fit:cover;
      border:1px solid rgba(255,255,255,0.25);
      display:block;
      filter: brightness(0.92) contrast(1.06);
      animation: avatarGlow 4s ease-in-out infinite;
    }
    @keyframes avatarGlow {
      0%,100% { box-shadow: 0 0 12px rgba(255,255,255,0.08); }
      50%      { box-shadow: 0 0 28px rgba(255,255,255,0.2), 0 0 50px rgba(255,255,255,0.07); }
    }

    /* name — glow only, no shimmer */
    .name {
      font-family: 'VT323', monospace;
      font-size: 2.1rem;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.1em;
      line-height: 1;
      margin-bottom: 0.55rem;
      animation: nameGlow 3s ease-in-out infinite;
    }
    @keyframes nameGlow {
      0%,100% {
        text-shadow:
          0 0 6px #fff,
          0 0 18px rgba(255,255,255,0.65),
          0 0 40px rgba(255,255,255,0.25);
      }
      50% {
        text-shadow:
          0 0 10px #fff,
          0 0 28px #fff,
          0 0 60px rgba(255,255,255,0.45),
          0 0 100px rgba(255,255,255,0.15);
      }
    }

    /* Q&A */
    .qa { text-align:center; margin-bottom:1.5rem; }
    .q-line {
      font-size: 0.66rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.09em; margin-bottom: 0.24rem;
      font-family: 'Share Tech Mono', monospace;
    }
    .q-line::before { content: '❯ '; color: rgba(255,255,255,0.2); }
    .a-line {
      font-size: 0.74rem;
      color: #ffffff;
      letter-spacing: 0.07em;
      font-family: 'Share Tech Mono', monospace;
      animation: answerGlow 3.5s ease-in-out infinite;
    }
    @keyframes answerGlow {
      0%,100% { text-shadow: 0 0 8px rgba(255,255,255,0.5), 0 0 18px rgba(255,255,255,0.15); }
      50%      { text-shadow: 0 0 14px #fff, 0 0 28px rgba(255,255,255,0.45); }
    }
    .a-line::before { content: '$ '; color: rgba(255,255,255,0.2); }
    .cur {
      display:inline-block; width:7px; height:12px;
      background:#fff; margin-left:2px; vertical-align:middle;
      box-shadow: 0 0 8px #fff;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity:0; } }

    /* divider */
    .divider {
      border:none; border-top:1px solid var(--border);
      margin:0 0 1.3rem; position:relative;
    }
    .divider::after {
      content: '/ /';
      position:absolute; left:50%;
      transform:translateX(-50%) translateY(-55%);
      background:var(--bg); padding:0 8px;
      font-size:0.52rem; color:rgba(255,255,255,0.18);
      font-family:'Share Tech Mono',monospace; letter-spacing:0.3em;
    }

    /* player */
    .player {
      background:rgba(255,255,255,0.025);
      border:1px solid var(--border); border-radius:2px;
      padding:0.78rem 1rem; margin-bottom:1.15rem;
      display:flex; align-items:center; gap:12px;
    }
    .play-btn {
      width:34px; height:34px; border-radius:50%;
      border:1px solid rgba(255,255,255,0.3);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0;
      font-size:0.78rem; color:#fff;
      transition:all 0.2s; user-select:none;
    }
    .play-btn:hover {
      background:rgba(255,255,255,0.08);
      box-shadow:0 0 18px rgba(255,255,255,0.18);
    }
    .play-btn.playing {
      border-color:#fff;
      box-shadow:0 0 20px rgba(255,255,255,0.25), 0 0 40px rgba(255,255,255,0.08);
    }
    .p-info { flex:1; min-width:0; }
    .p-title {
      font-size:0.67rem; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:5px;
      font-family:'Share Tech Mono',monospace; letter-spacing:0.03em;
      text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }
    .p-bar {
      width:100%; height:2px;
      background:rgba(255,255,255,0.1);
      border-radius:1px; cursor:pointer; overflow:hidden;
    }
    .p-fill {
      height:100%; background:#fff; width:0%;
      transition:width 0.4s linear;
      box-shadow:0 0 8px rgba(255,255,255,0.9), 0 0 18px rgba(255,255,255,0.4);
    }
    .p-time {
      font-size:0.57rem; color:rgba(255,255,255,0.4);
      margin-top:4px; letter-spacing:0.04em;
      font-family:'Share Tech Mono',monospace;
    }

    /* links */
    .links { display:flex; flex-direction:column; gap:0.48rem; }
    .lnk {
      display:flex; align-items:center; gap:12px;
      border:1px solid var(--border); border-radius:2px;
      padding:0.62rem 0.9rem; text-decoration:none;
      color: rgba(255,255,255,0.75);
      font-family:'Share Tech Mono',monospace;
      font-size:0.72rem; letter-spacing:0.08em;
      transition:all 0.25s; position:relative; overflow:hidden;
    }
    .lnk::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg, var(--faint), transparent);
      transform:translateX(-100%); transition:transform 0.28s ease;
    }
    .lnk:hover::before { transform:translateX(0); }
    .lnk:hover {
      border-color: var(--border-hi);
      color: #ffffff;
      box-shadow: 0 0 20px rgba(255,255,255,0.07);
      text-shadow: 0 0 12px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.25);
    }
    .lnk:hover .arr { opacity:1; transform:translateX(0); }

    /* icon sizing */
    .l-ico {
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      font-size: 0.95rem;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .lnk:hover .l-ico { opacity: 1; }

    /* platform icon colors on hover */
    .lnk.tw:hover .l-ico  { color: #ffffff; }
    .lnk.ig:hover .l-ico  { color: #e1306c; text-shadow: 0 0 10px #e1306c66; }
    .lnk.sp:hover .l-ico  { color: #1db954; text-shadow: 0 0 10px #1db95466; }
    .lnk.tl:hover .l-ico  { color: #ff6b6b; text-shadow: 0 0 10px #ff6b6b66; }

    .l-pre  { color:rgba(255,255,255,0.28); margin-right:3px; }
    .l-lbl  { flex:1; }
    .arr    { font-size:0.62rem; color:rgba(255,255,255,0.35); opacity:0; transform:translateX(-5px); transition:all 0.2s; }

    /* hint */
    .hint {
      font-size:0.57rem; color:rgba(255,255,255,0.2);
      text-align:center; margin-top:1rem; letter-spacing:0.14em;
      font-family:'Share Tech Mono',monospace;
      animation:hpulse 2.8s ease-in-out infinite; transition:opacity 0.5s;
    }
    @keyframes hpulse { 50%{opacity:0.55;} }

    /* footer */
    .footer {
      position:fixed; bottom:0; left:0; right:0; z-index:3;
      text-align:center; padding:0.6rem;
      font-size:0.54rem;
      color: rgba(255,255,255,0.5);
      letter-spacing:0.14em;
      border-top:1px solid rgba(255,255,255,0.06);
      background:rgba(5,5,5,0.92);
      font-family:'Share Tech Mono',monospace;
      text-shadow: 0 0 8px rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="titlebar">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
      <span class="bar-title">~/westcoast — bash</span>
    </div>

    <div class="inner">

      <!-- avatar -->
      <div class="avatar-wrap">
        <div class="avatar-outer">
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <img class="avatar-img" src="avatar.png"
               onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22112%22 height=%22112%22%3E%3Ccircle cx=%2256%22 cy=%2256%22 r=%2256%22 fill=%22%23111%22/%3E%3Ctext x=%2256%22 y=%2272%22 text-anchor=%22middle%22 font-size=%2252%22 fill=%22%23444%22%3E%3F%3C/text%3E%3C/svg%3E'"
               alt="account not found"/>
        </div>
      </div>

      <!-- name -->
      <div class="name">account not found</div>

      <!-- Q&A -->
      <div class="qa">
        <div class="q-line">where are you, Westcoast?</div>
        <div class="a-line">maybe he's gone<span class="cur"></span></div>
      </div>

      <hr class="divider"/>

      <!-- player -->
      <div class="player">
        <div class="play-btn" id="playBtn" onclick="togglePlay()">▶</div>
        <div class="p-info">
          <div class="p-title" id="trackTitle">[ no audio ]</div>
          <div class="p-bar" id="pBar" onclick="seekAudio(event)">
            <div class="p-fill" id="pFill"></div>
          </div>
          <div class="p-time" id="pTime">0:00 / 0:00</div>
        </div>
      </div>

      <!-- links -->
      <div class="links">
        <a class="lnk tw" href="https://twitter.com/0xvoided" target="_blank" rel="noopener">
          <span class="l-ico"><i class="fa-brands fa-x-twitter"></i></span>
          <span class="l-lbl"><span class="l-pre">~/</span>twitter</span>
          <span class="arr">→</span>
        </a>
        <a class="lnk ig" href="https://instagram.com/throwvoid" target="_blank" rel="noopener">
          <span class="l-ico"><i class="fa-brands fa-instagram"></i></span>
          <span class="l-lbl"><span class="l-pre">~/</span>instagram</span>
          <span class="arr">→</span>
        </a>
        <a class="lnk sp" href="https://open.spotify.com/user/31rwxgseaq2bct2jx3xpzyrj2ury?si=62d7124acbf5425b" target="_blank" rel="noopener">
          <span class="l-ico"><i class="fa-brands fa-spotify"></i></span>
          <span class="l-lbl"><span class="l-pre">~/</span>spotify</span>
          <span class="arr">→</span>
        </a>
        <a class="lnk tl" href="https://tellonym.me/throwvoid" target="_blank" rel="noopener">
          <span class="l-ico"><i class="fa-regular fa-comment-dots"></i></span>
          <span class="l-lbl"><span class="l-pre">~/</span>tellonym</span>
          <span class="arr">→</span>
        </a>
      </div>

      <div class="hint" id="hint">[ click anywhere to play ]</div>
    </div>
  </div>
</div>

<div class="footer">© all rights reserved — westcoast 2008</div>

<audio id="audio" src="end - VAMPIRE.mp3" preload="auto"></audio>

<script>
const audio      = document.getElementById('audio');
const playBtn    = document.getElementById('playBtn');
const pFill      = document.getElementById('pFill');
const pTime      = document.getElementById('pTime');
const trackTitle = document.getElementById('trackTitle');
const hint       = document.getElementById('hint');
let started = false;

const fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');

audio.addEventListener('loadedmetadata', ()=>{
  const n = decodeURIComponent(audio.src.split('/').pop())
    .replace(/\.[^.]+$/,'').replace(/[-_+]/g,' ');
  trackTitle.textContent = n || 'westcoast — track';
  pTime.textContent = '0:00 / ' + fmt(audio.duration);
});

audio.addEventListener('timeupdate', ()=>{
  if(!audio.duration) return;
  pFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  pTime.textContent  = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});

audio.addEventListener('ended', ()=>{
  playBtn.textContent = '▶';
  playBtn.classList.remove('playing');
  pFill.style.width = '0%';
});

function togglePlay(){
  if(audio.paused){
    audio.play();
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    hint.style.opacity = '0';
  } else {
    audio.pause();
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
  }
}

function seekAudio(e){
  if(!audio.duration) return;
  const r = document.getElementById('pBar').getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

document.addEventListener('click', ()=>{
  if(started) return; started = true;
  if(audio.paused) audio.play().then(()=>{
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    hint.style.opacity = '0';
  }).catch(()=>{});
}, {passive:true});

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if(!f?.type.startsWith('audio')) return;
  audio.src = URL.createObjectURL(f);
  trackTitle.textContent = f.name.replace(/\.[^.]+$/,'').replace(/[-_+]/g,' ');
  audio.play().then(()=>{
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    hint.style.opacity = '0';
  });
});
</script>
</body>
</html>
